baseURL = "https://nishant-at-work.github.io/"
theme = "hugo-apero"
languageCode = "en"
title = "Nishant Singh"
author = "Nishant Singh"
copyright = "Nishant Singh" # set to override the auto generated copyright using org info and now year
googleAnalytics = ""
disqusShortname = "" # see params.utterances to use utterances instead of Disqus
metaDataFormat = "yaml"
footnoteReturnLinkContents = "&#8617;" # ↩
paginate = 10
preserveTaxonomyNames = true
ignoreFiles = ["\\.Rmd$", "\\.Rmarkdown$", "_cache$", "\\.knit\\.md$", "\\.utf8\\.md$"]
enableEmoji = false

[markup]
  defaultMarkdownHandler = "goldmark"
  [markup.goldmark.renderer]
    unsafe = true  # Enable user to embed HTML snippets in Markdown content.
    hardwraps = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2
    ordered = false
  [markup.highlight]
    # one of: https://xyproto.github.io/splash/docs/
    style = "github"

[params]
  orgName = "Nishant Singh"
  description = "Head of Research at Youth Ki Awaaz. PhD, IIT Delhi. Public transport, inequality, youth, public opinion."
  favicon = "/img/icon.png"
  logo = "/img/icon.png"
  mainSections = ["work", "writing"]
  navallcaps = false
  # show/hide social icons in site header & footer
  socialInHeader = false
  socialInFooter = true
  # Default image for social sharing and search engines.
  # Place image file in `static` folder and specify image name here.
  sharing_image = "/img/nishant_avatar.jpg"
  # Twitter username (without @). Used when a visitor shares your site on Twitter.
  twitter = "surkh_syah"

  # use a built-in color theme
  # one of: forest / grayscale / peach / plum /
  #         poppy / sky / violet / water
  theme = "grayscale"

  # or, leave theme empty & make your own palette
  # see docs at https://hugo-apero.netlify.app/blog/color-themes/
  # the custom scss file must be in the assets/ folder
  # add the filename name here, without extension
  # to use hex colors instead of named tachyons colors, include "hex" in filename
  custom_theme = ""

  # use an embedded font-family
  # serif options: Fraunces / EB Garamond / Bitter
  # sans-serif options: Commissioner / Atkinson Hyperlegible / Metropolis
  customtextFontFamily = "Commissioner"
  customheadingFontFamily = "EB Garamond"
  # alternatively, leave empty and select basic font options: sans-serif or serif
  textFontFamily = "sans-serif"
  headingFontFamily = "serif"

  # Disable comments
  [params.utterances]
    use_utterances = false
    repo_name = "nishant-at-work/nishant-at-work.github.io"
    issue_term = "pathname"
    theme = "boxy-light"
    label = "comments :crystal_ball:"

  # Configuration of math rendering
  [params.math]
    renderer = "katex" # one of "mathjax" / "katex"

  # Social icons may appear on homepage and in site header or footer
  [[params.social]]
      icon      = "cv" # icon name without the 'fa-'
      icon_pack = "ai"
      url       = "/docs/Nishant_CV.pdf"
  [[params.social]]
      icon      = "envelope" # icon name without the 'fa-'
      icon_pack = "fas"
      url       = "mailto:nishant@youthkiawaaz.com"
  [[params.social]]
      icon      = "google-scholar" # icon name without the 'fa-'
      icon_pack = "ai"
      url       = "https://scholar.google.co.in/citations?user=-Y6_q6oAAAAJ"
  [[params.social]]
      icon      = "github" # icon name without the 'fa-'
      icon_pack = "fab"
      url       = "https://github.com/nishant-at-work"
  [[params.social]]
      icon      = "linkedin" # icon name without the 'fa-'
      icon_pack = "fab"
      url       = "https://www.linkedin.com/in/nishant-at-work/"
  [[params.social]]
      icon      = "orcid" # icon name without the 'fa-'
      icon_pack = "ai"
      url       = "https://orcid.org/0000-0002-8203-9616"

[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"

[menu]
  # Configure header
  [[menu.header]]
    name = "About"
    title = "About Nishant"
    url = "/about/"
    weight = 10
  [[menu.header]]
    name = "Work"
    title = "Research, Reports & Advocacy"
    url = "/work/"
    weight = 20
  [[menu.header]]
    name = "Writing"
    title = "Articles & Commentary"
    url = "/writing/"
    weight = 30
  [[menu.header]]
    name = "Contact"
    title = "Get in touch"
    url = "/contact/"
    weight = 40

  # Configure footer
  [[menu.footer]]
    name = "Contact"
    title = "Contact form"
    url = "/contact/"
    weight = 1
  [[menu.footer]]
    name = "Subscribe"
    title = "RSS"
    url = "/writing/index.xml"
    weight = 2

# see https://gohugo.io/about/hugo-and-gdpr/
[privacy]
  [privacy.disqus]
    disable = true
  [privacy.googleAnalytics]
    disable = false
    anonymizeIP = true
    respectDoNotTrack = true
  [privacy.instagram]
    disable = false
    simple = true
  [privacy.twitter]
    disable = false
    enableDNT = true
    simple = false
  [privacy.vimeo]
    disable = false
    enableDNT = true
    simple = true
  [privacy.youtube]
    disable = false
    privacyEnhanced = true
